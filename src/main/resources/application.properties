spring.application.name=job-portal

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:jobportaldb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Servlet Multipart configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Custom property for file uploads
app.upload.dir=./uploads/resumes

# Security settings
spring.security.boot.debug=false
