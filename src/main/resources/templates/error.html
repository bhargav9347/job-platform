<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="dashboard-container" style="text-align: center; padding: 5rem 2rem;">
        <i class="fas fa-exclamation-triangle" style="font-size: 5rem; color: #ef4444; margin-bottom: 2rem;"></i>
        <h1 style="font-size: 3rem;">Oops! Something went wrong</h1>
        <p style="color: var(--text-muted); font-size: 1.2rem; margin-top: 1rem;" th:text="${error}">An unexpected error occurred.</p>
        <a th:href="@{/}" class="btn btn-primary" style="margin-top: 2rem;">Back to Home</a>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
