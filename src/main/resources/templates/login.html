<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="auth-container glass">
        <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
        
        <div th:if="${param.error}" class="badge" style="background: rgba(239, 68, 68, 0.2); color: #ef4444; width: 100%; text-align: center; margin-bottom: 1rem; padding: 0.8rem;">
            Invalid email or password.
        </div>
        <div th:if="${param.logout}" class="badge" style="background: rgba(34, 197, 94, 0.2); color: #22c55e; width: 100%; text-align: center; margin-bottom: 1rem; padding: 0.8rem;">
            You have been logged out.
        </div>
        <div th:if="${param.registered}" class="badge" style="background: rgba(34, 197, 94, 0.2); color: #22c55e; width: 100%; text-align: center; margin-bottom: 1rem; padding: 0.8rem;">
            Registration successful! Please login.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="username" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
            Don't have an account? <a th:href="@{/register}" style="color: var(--primary-color)">Create one</a>
        </p>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
