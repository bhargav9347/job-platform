<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="auth-container glass">
        <h2 style="text-align: center; margin-bottom: 2rem;">Join JobVista</h2>
        
        <div th:if="${error}" class="badge" style="background: rgba(239, 68, 68, 0.2); color: #ef4444; width: 100%; text-align: center; margin-bottom: 1rem; padding: 0.8rem;" th:text="${error}">
        </div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="6" placeholder="At least 6 characters">
            </div>
            <div class="form-group">
                <label>Register As</label>
                <select name="role" required>
                    <option value="ROLE_STUDENT">Student (Job Seeker)</option>
                    <option value="ROLE_EMPLOYER">Employer (Recruiter)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
            Already have an account? <a th:href="@{/login}" style="color: var(--primary-color)">Log in</a>
        </p>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
